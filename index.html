<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベルセレマ 会館さがし</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho:wght@600&display=swap');
:root{
  --ink:#1a1a2e; --gold:#b8962e; --gold-l:#d4af5a;
  --cream:#f4f1ec; --border:#ddd5c8; --grey:#6b6b7b;
  --green:#2a7a4f; --red:#b03030;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:'Noto Sans JP',sans-serif;color:var(--ink);}

header{background:var(--ink);padding:14px 16px 0;text-align:center;}
header h1{font-family:'Shippori Mincho',serif;color:#fff;font-size:1.15rem;letter-spacing:.15em;}
header p{color:var(--gold-l);font-size:.63rem;margin-top:3px;}
.hline{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-top:10px;}

/* タブ */
.tabs{display:flex;background:var(--ink);max-width:560px;margin:0 auto;}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:.74rem;color:#888;
  cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--gold-l);border-bottom-color:var(--gold);}
.panel{display:none;} .panel.active{display:block;}

.wrap{max-width:560px;margin:0 auto;padding:14px 14px 0;}

/* 検索ボックス */
.hint{font-size:.7rem;color:var(--grey);margin-bottom:8px;line-height:1.7;
  background:#fff;border:1px solid var(--border);border-radius:6px;padding:7px 12px;}
.hint b{color:var(--gold);}

.suggest-wrap{position:relative;}
.search-row{display:flex;gap:8px;}
.search-row input{
  flex:1;border:2px solid var(--border);border-radius:8px;
  font-size:1.1rem;padding:12px 13px;color:var(--ink);
  font-family:'Noto Sans JP',sans-serif;outline:none;background:#fff;
  transition:border-color .2s;
}
.search-row input:focus{border-color:var(--gold);}
.search-row input::placeholder{color:#bbb;font-size:.88rem;}
.btn{background:var(--gold);border:none;border-radius:8px;color:#fff;
  font-size:1rem;font-weight:700;padding:12px 18px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.btn:hover{background:var(--gold-l);}

/* サジェスト */
.suggest{background:#fff;border:1px solid var(--border);border-radius:8px;
  margin-top:4px;display:none;box-shadow:0 4px 16px rgba(0,0,0,.1);
  max-height:260px;overflow-y:auto;position:absolute;width:100%;z-index:99;}
.sg{padding:11px 14px;cursor:pointer;border-bottom:1px solid #f0ebe2;
  display:flex;justify-content:space-between;align-items:center;transition:background .1s;}
.sg:last-child{border-bottom:none;}
.sg:hover{background:var(--gold);color:#fff;}
.sg-kanji{font-size:.95rem;font-weight:700;}
.sg-kana{font-size:.7rem;color:var(--grey);}
.sg:hover .sg-kana{color:#fff;}

.status{font-size:.8rem;color:var(--grey);padding:8px 0 3px;min-height:28px;text-align:center;}
.status.ok{color:var(--green);} .status.err{color:var(--red);}

/* チップ */
.chips-label{font-size:.68rem;color:var(--grey);margin-bottom:5px;}
.chips{display:flex;flex-wrap:wrap;gap:4px;padding-bottom:12px;}
.chip{background:#fff;border:1px solid var(--border);border-radius:20px;
  padding:4px 11px;font-size:.7rem;cursor:pointer;color:var(--ink);
  transition:all .15s;display:flex;flex-direction:column;align-items:center;}
.chip-kana{font-size:.58rem;color:var(--grey);}
.chip:hover{background:var(--gold);color:#fff;border-color:var(--gold);}
.chip:hover .chip-kana{color:#ffe;}

/* 結果カード */
.results{max-width:560px;margin:0 auto;padding:0 14px 50px;}
.res-head{font-size:.72rem;color:var(--grey);border-bottom:1px solid var(--border);
  padding-bottom:6px;margin-bottom:10px;}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;
  padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:11px;
  box-shadow:0 2px 5px rgba(0,0,0,.04);animation:up .2s ease both;}
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card.top1{border:2px solid var(--gold);background:#fffdf7;}
.rank{min-width:28px;height:28px;border-radius:50%;background:var(--gold);color:#fff;
  font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card.top1 .rank{min-width:32px;height:32px;font-size:.88rem;}
.body{flex:1;min-width:0;}
.hall-name{font-family:'Shippori Mincho',serif;font-size:1rem;font-weight:600;margin-bottom:2px;}
.card.top1 .hall-name{font-size:1.1rem;color:var(--gold);}
.hall-addr{font-size:.73rem;color:var(--grey);}
.dist-wrap{text-align:right;flex-shrink:0;}
.dist-num{font-size:1.35rem;font-weight:700;color:var(--ink);line-height:1;}
.card.top1 .dist-num{color:var(--gold);}
.dist-unit{font-size:.62rem;color:var(--grey);}
.map-link{display:inline-block;margin-top:5px;font-size:.7rem;color:var(--green);
  text-decoration:none;border:1px solid var(--green);border-radius:4px;padding:2px 8px;}
.map-link:hover{background:var(--green);color:#fff;}

/* 逆引きパネル */
.rev-wrap{max-width:560px;margin:0 auto;padding:14px 14px 10px;}
.hall-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.hall-btn{background:#fff;border:1.5px solid var(--border);border-radius:8px;
  padding:12px 14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  font-size:.92rem;font-weight:700;color:var(--ink);transition:all .15s;text-align:left;}
.hall-btn:hover,.hall-btn.sel{background:var(--gold);color:#fff;border-color:var(--gold);}
.hall-btn-sub{font-size:.7rem;font-weight:400;color:var(--grey);margin-top:2px;}
.hall-btn:hover .hall-btn-sub,.hall-btn.sel .hall-btn-sub{color:#ffe;}

.radius-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;
  background:#fff;border:1px solid var(--border);border-radius:6px;padding:9px 13px;}
.radius-row label{font-size:.75rem;color:var(--grey);white-space:nowrap;}
.radius-row input[type=range]{flex:1;accent-color:var(--gold);}
.radius-val{font-size:.88rem;font-weight:700;color:var(--gold);min-width:44px;text-align:right;}

/* 逆引き結果 */
.town-result{max-width:560px;margin:0 auto;padding:0 14px 50px;}
.town-res-head{font-size:.72rem;color:var(--grey);border-bottom:1px solid var(--border);
  padding-bottom:6px;margin-bottom:10px;}
.town-chips{display:flex;flex-wrap:wrap;gap:5px;}
.town-chip{background:#fff;border:1px solid var(--border);border-radius:6px;
  padding:5px 11px;font-size:.8rem;cursor:default;}
.town-chip:nth-child(odd){border-left:3px solid var(--gold);}

/* パスワード保護 編集モード */
.lock-btn{position:fixed;bottom:16px;right:16px;background:var(--ink);color:#fff;
  border:none;border-radius:50%;width:42px;height:42px;font-size:1rem;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:999;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;
  align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:360px;}
.modal h3{font-size:1rem;margin-bottom:12px;color:var(--ink);}
.modal input{width:100%;border:1.5px solid var(--border);border-radius:6px;
  padding:10px 12px;font-size:1rem;outline:none;font-family:'Noto Sans JP',sans-serif;margin-bottom:10px;}
.modal input:focus{border-color:var(--gold);}
.modal-btns{display:flex;gap:8px;}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:6px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-size:.88rem;font-weight:700;}
.btn-ok{background:var(--gold);color:#fff;}
.btn-cancel{background:#eee;color:var(--grey);}
.modal-err{font-size:.75rem;color:var(--red);margin-bottom:8px;display:none;}

.edit-panel{display:none;max-width:560px;margin:0 auto;padding:14px;}
.edit-panel.show{display:block;}
.edit-title{font-size:.85rem;font-weight:700;color:var(--gold);margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--border);}
.edit-textarea{width:100%;height:160px;border:1.5px solid var(--border);border-radius:6px;
  padding:10px;font-size:.78rem;font-family:monospace;outline:none;resize:vertical;}
.edit-textarea:focus{border-color:var(--gold);}
.edit-actions{display:flex;gap:8px;margin-top:8px;}
.edit-actions button{flex:1;padding:10px;border:none;border-radius:6px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;font-size:.85rem;font-weight:700;}
.btn-save{background:var(--green);color:#fff;}
.btn-logout{background:#eee;color:var(--grey);}
.edit-note{font-size:.7rem;color:var(--grey);margin-top:6px;line-height:1.6;}
</style>
</head>
<body>

<header>
  <h1>ベルセレマ　会館さがし</h1>
  <p>町名を入れると近い会館が出ます</p>
  <div class="hline"></div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('search')">🔍 町名→会館</div>
  <div class="tab"        onclick="switchTab('rev')">🏛 会館→町名</div>
</div>

<!-- ===== 町名→会館 タブ ===== -->
<div class="panel active" id="panel-search">
<div class="wrap">
  <div class="hint">💡 <b>ひらがなでも漢字でも</b>入力できます<br>例：「こうもんみょう」→「公文名」が候補に出ます</div>
  <div class="suggest-wrap">
    <div class="search-row">
      <input id="inp" type="text" placeholder="町名・部落名（例：こし、じょうがわら…）" autocomplete="off"/>
    </div>
    <div class="suggest" id="suggest"></div>
    <div style="text-align:center;margin-top:10px">
      <button class="btn" onclick="doSearch()" style="padding:12px 48px;font-size:1rem">検索</button>
    </div>
  </div>
  <div class="status" id="st">町名を入力してください（ひらがなOK）</div>
  <div class="chips-label">よく使う地名</div>
  <div class="chips" id="chips"></div>
</div>
<div class="results" id="results"></div>
</div>

<!-- ===== 会館→町名 タブ ===== -->
<div class="panel" id="panel-rev">
<div class="rev-wrap">
  <div class="chips-label" style="margin-bottom:8px">会館を選んでください</div>
  <div class="hall-grid" id="hallGrid"></div>
  <div class="radius-row">
    <label>範囲</label>
    <input type="range" id="revRad" min="1" max="20" value="5" step="1" oninput="setRevRad(this.value)">
    <div class="radius-val" id="revRadVal">5 km</div>
  </div>
  <div class="status" id="revSt">会館を選ぶと圏内の町名が表示されます</div>
</div>
<div class="town-result" id="townResult"></div>
</div>

<!-- 編集ロックボタン -->
<button class="lock-btn" onclick="openLock()" title="管理者編集">🔒</button>

<!-- パスワードモーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>🔐 管理者パスワード</h3>
    <div class="modal-err" id="modalErr">パスワードが違います</div>
    <input type="password" id="pwInput" placeholder="パスワードを入力" />
    <div class="modal-btns">
      <button class="btn-ok" onclick="checkPw()">ログイン</button>
      <button class="btn-cancel" onclick="closeLock()">キャンセル</button>
    </div>
  </div>
</div>

<!-- 編集パネル（パスワード後に表示） -->
<div class="edit-panel" id="editPanel">
  <div class="edit-title">🛠 管理者モード：町名データ編集</div>
  <div class="edit-note">
    書式：{k:'町名', r:'よみがな', lat:緯度, lng:経度},<br>
    一行追加するだけで検索に反映されます。
  </div>
  <textarea class="edit-textarea" id="editArea"></textarea>
  <div class="edit-actions">
    <button class="btn-save" onclick="saveEdit()">✅ 保存して反映</button>
    <button class="btn-logout" onclick="logout()">ログアウト</button>
  </div>
</div>

// ===== サジェスト =====
const inp = document.getElementById('inp');
const sgBox = document.getElementById('suggest');
inp.addEventListener('input', ()=>{ const q=inp.value.trim(); q ? showSuggest(q) : (sgBox.style.display='none'); });
inp.addEventListener('keydown', e=>{ if(e.key==='Enter') doSearch(); if(e.key==='Escape') sgBox.style.display='none'; });

function norm(s){ return s.replace(/\s/g,''); }

function showSuggest(q){
  const nq = norm(q);
  const matched = TOWNS.filter(t=> norm(t.k).includes(nq) || norm(t.r).includes(nq)).slice(0,8);
  if(!matched.length){ sgBox.style.display='none'; return; }
  sgBox.innerHTML = matched.map(t=>`<div class="sg" onclick="selectTown('${t.k}','${t.r}')">
    <div><div class="sg-kanji">${t.k}</div><div class="sg-kana">${t.r}</div></div>
  </div>`).join('');
  sgBox.style.display='block';
}

function selectTown(kanji, kana){
  inp.value = kanji; sgBox.style.display='none';
  const t = TOWNS.find(t=>t.k===kanji);
  if(t) renderHalls(t.lat, t.lng, kanji+'（'+kana+'）');
  else doSearch();
}

function doSearch(){
  const q = norm(inp.value); if(!q) return; sgBox.style.display='none';
  const hit =
    TOWNS.find(t=>norm(t.k)===q||norm(t.r)===q) ||
    TOWNS.find(t=>norm(t.k).startsWith(q)||norm(t.r).startsWith(q)) ||
    TOWNS.find(t=>norm(t.k).includes(q)||norm(t.r).includes(q));
  if(hit){ renderHalls(hit.lat, hit.lng, hit.k+'（'+hit.r+'）'); }
  else {
    document.getElementById('st').textContent=`「${q}」が見つかりませんでした`;
    document.getElementById('st').className='status err';
    document.getElementById('results').innerHTML='';
  }
}

function km(a,b,c,d){
  const R=6371,p=Math.PI/180;
  const x=Math.sin((c-a)*p/2)**2+Math.cos(a*p)*Math.cos(c*p)*Math.sin((d-b)*p/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function renderHalls(lat, lng, label){
  document.getElementById('st').textContent=`📍 「${label}」で検索しました`;
  document.getElementById('st').className='status ok';
  const sorted = HALLS.map(h=>({...h,d:km(lat,lng,h.lat,h.lng)})).sort((a,b)=>a.d-b.d);
  const townMapUrl = `https://maps.google.com/?q=${lat},${lng}`;
  document.getElementById('results').innerHTML =
    `<div class="res-head">「${label}」から近い順　<a href="${townMapUrl}" target="_blank" style="font-size:.75rem;color:var(--green);border:1px solid var(--green);border-radius:4px;padding:2px 8px;text-decoration:none;margin-left:6px">🗺 この場所を地図で見る</a></div>` +
    sorted.map((h,i)=>`<div class="card${i===0?' top1':''}">
      <div class="rank">${i+1}</div>
      <div class="body">
        <div class="hall-name">${h.name}</div>
        <div class="hall-addr">${h.addr}</div>
        <a class="map-link" href="https://maps.google.com/?q=${encodeURIComponent('富山県'+h.addr)}" target="_blank">📍 地図を開く</a>
      </div>
      <div class="dist-wrap"><div class="dist-num">${h.d.toFixed(1)}</div><div class="dist-unit">km</div></div>
    </div>`).join('');
}

// ===== 逆引き（会館→町名） =====
let revRadius = 5;
let selHallIdx = null;

function setRevRad(v){
  revRadius = parseInt(v);
  document.getElementById('revRadVal').textContent = v+' km';
  if(selHallIdx !== null) renderTowns(selHallIdx);
}

function selectHall(idx){
  selHallIdx = idx;
  document.querySelectorAll('.hall-btn').forEach((b,i)=>b.classList.toggle('sel',i===idx));
  renderTowns(idx);
}

function renderTowns(idx){
  const h = HALLS[idx];
  const nearby = TOWNS
    .map(t=>({...t, d:km(h.lat,h.lng,t.lat,t.lng)}))
    .filter(t=>t.d<=revRadius)
    .sort((a,b)=>a.d-b.d);

  document.getElementById('revSt').textContent =
    `${h.name}から${revRadius}km圏内：${nearby.length}件`;
  document.getElementById('revSt').className = 'status ok';

  document.getElementById('townResult').innerHTML = nearby.length===0
    ? `<div style="text-align:center;padding:20px;color:var(--grey);font-size:.88rem">${revRadius}km圏内に町名データがありません</div>`
    : `<div class="town-res-head">${h.name} から ${revRadius}km 圏内の町名</div>
       <div class="town-chips">${nearby.map(t=>"<a class='town-chip' href='https://maps.google.com/?q="+t.lat+","+t.lng+"' target='_blank' style='text-decoration:none;color:inherit;cursor:pointer'>"+t.k+"<span style='font-size:.65rem;color:var(--grey);margin-left:4px'>"+t.r+" "+t.d.toFixed(1)+"km 🗺</span></a>").join('')}</div>`;
}

// ===== タブ切替 =====
function switchTab(name){
  ['search','rev'].forEach((n,i)=>{
    document.querySelectorAll('.tab')[i].classList.toggle('active',n===name);
    document.getElementById('panel-'+n).classList.toggle('active',n===name);
  });
}

document.addEventListener('click', e=>{ if(!e.target.closest('.suggest-wrap')) sgBox.style.display='none'; });

// ===== パスワード管理 =====
const PW = 'bell2024miho'; // ← ここを変えるとパスワード変更

function openLock(){
  document.getElementById('modalBg').classList.add('show');
  document.getElementById('pwInput').value='';
  document.getElementById('modalErr').style.display='none';
  setTimeout(()=>document.getElementById('pwInput').focus(),100);
}
function closeLock(){ document.getElementById('modalBg').classList.remove('show'); }
function checkPw(){
  if(document.getElementById('pwInput').value === PW){
    closeLock();
    openEdit();
  } else {
    document.getElementById('modalErr').style.display='block';
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{ if(e.key==='Enter') checkPw(); });

function openEdit(){
  const panel = document.getElementById('editPanel');
  panel.classList.add('show');
  // 追加データを表示
  const extra = JSON.parse(localStorage.getItem('extraTowns')||'[]');
  document.getElementById('editArea').value =
    extra.map(t=>`{k:'${t.k}', r:'${t.r}', lat:${t.lat}, lng:${t.lng}}`).join('\n');
  panel.scrollIntoView({behavior:'smooth'});
}

function saveEdit(){
  const raw = document.getElementById('editArea').value.trim();
  if(!raw){ localStorage.removeItem('extraTowns'); alert('保存しました（追加データなし）'); location.reload(); return; }
  try {
    const parsed = eval('['+raw.replace(/}\s*\n\s*{/g,'},{')+']');
    localStorage.setItem('extraTowns', JSON.stringify(parsed));
    alert(`✅ ${parsed.length}件を保存しました。ページを再読み込みします。`);
    location.reload();
  } catch(e){
    alert('⚠️ 書式にエラーがあります。確認してください。\n'+e.message);
  }
}

function logout(){
  document.getElementById('editPanel').classList.remove('show');
}
</script>
